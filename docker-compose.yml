services:
  app:
    build: .
    ports:
      - "${APP_PORT}:8000"
    environment:
      APP_NAME: ${APP_NAME:-icd11-code-normalizer}
      APP_ENV: production
      APP_PORT: ${APP_PORT:-8000}
      SQLITE_PATH: /data/app.db
      AUTH_TOKEN: ${AUTH_TOKEN:-change-me}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENROUTER_BASE_URL: ${OPENROUTER_BASE_URL:-https://openrouter.ai/api/v1}
      OPENROUTER_MODEL: ${OPENROUTER_MODEL:-openrouter/free}
      LLM_TIMEOUT_SECONDS: ${LLM_TIMEOUT_SECONDS:-45}
      PROMPT_VERSION: ${PROMPT_VERSION:-v1}
      OCL_BASE_URL: ${OCL_BASE_URL:-https://api.openconceptlab.org}
      OCL_TOKEN: ${OCL_TOKEN:-}
      OCL_LOOKUP_SOURCE: ${OCL_LOOKUP_SOURCE:-/orgs/OpenMRS-OCL-Squad/sources/ICD-11-WHO-Mapper/}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      SIMPLE_TABULATION_ZIP_URL: ${SIMPLE_TABULATION_ZIP_URL:-https://icdcdn.who.int/static/releasefiles/2026-01/SimpleTabulation-ICD-11-MMS-en.zip}
    volumes:
      - ./data:/data
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
